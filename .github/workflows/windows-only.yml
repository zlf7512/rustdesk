name: Build Windows RustDesk
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2

      - name: Verify files and build
        run: |
          dir
          if exist build.bat (
            echo Found build.bat
            cmd /c build.bat --flutter --release
          ) else (
            echo build.bat not found, trying direct build
            cargo build --release
            cd flutter
            flutter pub get
            flutter build windows --release
          )

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows
          path: |
            target/release/rustdesk.exe
            flutter/build/windows/x64/runner/Release/RustDesk.exe
