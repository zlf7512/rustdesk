name: Build Windows RustDesk (Official Script)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2

      # 3. 构建 Flutter UI
      - name: Build Flutter
        run: |
          cd flutter
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release

      # 4. 构建 Rust（可选，取决于你的项目结构）
      - name: Build Rust
        run: |
          cargo build --release

      # 5. 生成 EXE 安装包（使用 NSIS）
      - name: Install NSIS
        run: |
          choco install nsis -y

      - name: Build Installer
        run: |
          # 编译 NSI 脚本生成 EXE 安装包
          # 假设项目中有 installer.nsi 或类似的文件
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 installer.nsi

      # 6. 上传产物
      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows-Installer
          path: |
            *.exe
            RustDesk-Setup-*.exe
