name: Build Windows RustDesk (Final)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      # 关键：加上 --classic，强制经典模式
      - name: Install opus via vcpkg
        run: |
          C:\vcpkg\vcpkg install "opus:x64-windows-static" --classic

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2

      - name: Build Rust Core
        run: cargo build --release

      - name: Prepare Flutter
        run: |
          cd flutter
          flutter pub get

      - name: Build Windows Client
        run: |
          cd flutter
          flutter build windows --release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows
          path: |
            target/release/rustdesk.exe
            flutter/build/windows/x64/runner/Release/RustDesk.exe
