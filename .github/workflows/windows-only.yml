name: Build Windows RustDesk (Official Script)
on: workflow_dispatch

env:
  VERSION: 1.0.0

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 VCPKG
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ runner.workspace }}/b/vcpkg'
          vcpkgGitCommitId: 'a1a1cbc975f912220b237def74ce27d6a1a14eab'

      # 2. 安装依赖
      - name: Install dependencies
        run: |
          vcpkg integrate install
          vcpkg install opus:x64-windows

      # 3. 设置 VCPKG_ROOT
      - name: Set VCPKG_ROOT
        run: |
          echo "VCPKG_ROOT=${{ runner.workspace }}/b/vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 4. 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 5. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0

      # 6. 生成 FFI 绑定
      - name: Generate Rust FFI bridge
        run: |
          cd flutter
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ..

      # 7. 编译 Rust
      - name: Build Rust
        run: |
          cargo build --release

      # 8. 构建 Flutter UI
      - name: Build Flutter
        run: |
          cd flutter
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release
          cd ..

      # 9. 安装 NSIS
      - name: Install NSIS
        run: |
          choco install nsis -y

      # 10. 生成 EXE 安装包
      - name: Build Installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 /DVERSION=${{ env.VERSION }} installer.nsi

      # 11. 上传产物
      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows-Installer
          path: RustDesk-Setup-*.exe
