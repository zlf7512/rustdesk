name: Build Windows RustDesk (Official Script)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2

      # 3. 用 cmd 运行官方 build.bat，一次性编译 Rust + Flutter
      - name: Build using official script
        run: |
          cmd /c build.bat --flutter --release

      # 4. 上传产物
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows
          path: target/release/rustdesk.exe
