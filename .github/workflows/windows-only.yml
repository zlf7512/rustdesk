name: Build Windows RustDesk (Official Script)
on: workflow_dispatch

env:
  VERSION: 1.0.0

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. 安装 flutter_rust_bridge_codegen
      - name: Install flutter_rust_bridge_codegen
        run: |
          cargo install flutter_rust_bridge_codegen

      # 3. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0

      # 4. 生成 Rust FFI 绑定
      - name: Generate Rust FFI bridge
        run: |
          cd flutter
          flutter pub get
          flutter_rust_bridge_codegen --rust-input ../src/lib.rs --dart-output lib/generated_bridge.dart
          cd ..

      # 5. 编译 Rust
      - name: Build Rust
        run: |
          cargo build --release

      # 6. 构建 Flutter UI
      - name: Build Flutter
        run: |
          cd flutter
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release
          cd ..

      # 7. 安装 NSIS
      - name: Install NSIS
        run: |
          choco install nsis -y

      # 8. 生成 EXE 安装包
      - name: Build Installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 /DVERSION=${{ env.VERSION }} installer.nsi

      # 9. 上传产物
      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows-Installer
          path: RustDesk-Setup-*.exe
