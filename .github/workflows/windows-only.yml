name: Build Windows RustDesk (Official Script)
on: workflow_dispatch

env:
  VERSION: 1.0.0

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. 安装编译所需工具和库
      - name: Install build dependencies
        run: |
          choco install llvm -y
          choco install nasm -y

      # 3. 设置编译环境变量
      - name: Setup build environment
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # 4. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0

      # 5. 生成 FFI 绑定
      - name: Generate Rust FFI bridge
        run: |
          cd flutter
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs
          cd ..

      # 6. 编译 Rust
      - name: Build Rust
        run: |
          cargo build --release

      # 7. 构建 Flutter UI
      - name: Build Flutter
        run: |
          cd flutter
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release
          cd ..

      # 8. 安装 NSIS
      - name: Install NSIS
        run: |
          choco install nsis -y

      # 9. 生成 EXE 安装包
      - name: Build Installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 /DVERSION=${{ env.VERSION }} installer.nsi

      # 10. 上传产物
      - name: Upload EXE Installer
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows-Installer
          path: RustDesk-Setup-*.exe
