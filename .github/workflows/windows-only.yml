name: Build Windows RustDesk (Official Script)
on: workflow_dispatch

env:
  VERSION: 1.0.0

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 Python
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 2. 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0

      # 4. 使用 build.py 脚本构建
      - name: Build with build.py
        run: |
          python build.py --flutter --skip-portable-pack

      # 5. 安装 NSIS
      - name: Install NSIS
        run: |
          choco install nsis -y

      # 6. 生成 EXE 安装包
      - name: Build Installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 /DVERSION=${{ env.VERSION }} installer.nsi

      # 7. 上传产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows
          path: |
            flutter/build/windows/x64/runner/Release/flutter_hbb.exe
            RustDesk-Setup-*.exe
