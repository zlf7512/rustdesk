name: Build Windows RustDesk (Full VCPKG)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 vcpkg 并设置环境变量
      - name: Install vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          echo "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      # 2. 安装 Rust
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2

      # 4. 编译 Rust 核心（现在能找到 VCPKG_ROOT 了）
      - name: Build Rust Core
        run: cargo build --release

      # 5. 准备 Flutter 环境
      - name: Prepare Flutter
        run: |
          cd flutter
          flutter pub get

      # 6. 编译 Windows 客户端
      - name: Build Windows Client
        run: |
          cd flutter
          flutter build windows --release

      # 7. 上传产物
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows
          path: |
            target/release/rustdesk.exe
            flutter/build/windows/x64/runner/Release/RustDesk.exe
