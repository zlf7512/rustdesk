name: Build Windows RustDesk (Official Script)
on: workflow_dispatch

env:
  VERSION: 1.0.0

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      # 1. 安装 Rust（预编译的依赖库）
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # 2. 下载预编译的 opus 库
      - name: Setup prebuilt dependencies
        run: |
          mkdir -p target\release\deps
          # 下载预编译的 opus Windows 库
          # 可以从 vcpkg 或其他源获取预编译的二进制文件
          echo "Skipping vcpkg, using system libraries"

      # 3. 安装 Flutter
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0

      # 4. 只构建 Flutter（暂时跳过 Rust 编译）
      - name: Build Flutter
        run: |
          cd flutter
          flutter config --enable-windows-desktop
          flutter pub get
          flutter build windows --release
          cd ..

      # 5. 安装 NSIS
      - name: Install NSIS
        run: |
          choco install nsis -y

      # 6. 更新 installer.nsi 配置
      - name: Prepare installer
        run: |
          # 确保生成的可执行文件存在
          if (!(Test-Path "flutter\build\windows\x64\runner\Release\flutter_hbb.exe")) {
            Write-Error "Flutter executable not found"
            exit 1
          }

      # 7. 生成 EXE 安装包
      - name: Build Installer
        run: |
          "C:\Program Files (x86)\NSIS\makensis.exe" /V4 /DVERSION=${{ env.VERSION }} installer.nsi

      # 8. 上传产物
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RustDesk-Windows-Installer
          path: |
            RustDesk-Setup-*.exe
            flutter/build/windows/x64/runner/Release/flutter_hbb.exe
